<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  font-family: Inter, sans-serif;
  margin:0;
  background:#0b1220;
  color:white;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:40px 20px;
}

h1{
  font-size:36px;
  margin-bottom:10px;
}

p{
  color:#cbd5e1;
}

.grid{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap:15px;
  margin-top:30px;
}

.card{
  background:#111827;
  padding:15px;
  border-radius:12px;
  border-left:4px solid #3b82f6;
}

.card h3{
  margin:0;
  font-size:16px;
}

.card small{
  color:gray;
}

.message{
  margin-top:10px;
  color:#cbd5e1;
  font-size:14px;
  white-space:pre-wrap;
}

.btn{
  margin-top:10px;
  display:inline-block;
  padding:6px 10px;
  background:#ef4444;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.btn:hover{
  background:#dc2626;
}

.loader{
  text-align:center;
  margin-top:30px;
  color:gray;
}

#logoutBtn{
  position:fixed;
  top:20px;
  right:20px;
  padding:10px 14px;
  background:#ef4444;
  border:none;
  border-radius:10px;
  color:white;
  font-weight:600;
  cursor:pointer;
}

#logoutBtn:hover{
  background:#dc2626;
}
</style>

</head>

<body>

<button id="logoutBtn">🚪 Logout</button>

<div class="container">

<h1>📩 Admin Dashboard</h1>
<p>Manage all contact messages</p>

<div id="messages" class="grid"></div>
<div id="loader" class="loader">Loading messages...</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getAuth,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyBFwxMznFt8basOqDELsilAupDG55-c4_M",
  authDomain: "notiva-store.firebaseapp.com",
  projectId: "notiva-store",
  storageBucket: "notiva-store.firebasestorage.app",
  messagingSenderId: "577146025738",
  appId: "1:577146025738:web:8dac6ce52b2cc07a266cf3",
  measurementId: "G-J6XZD55M9Y"
};

/* 🔥 INIT */
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* 📦 ELEMENTS */
const container = document.getElementById("messages");
const loader = document.getElementById("loader");

/* 🔐 AUTH CHECK */
onAuthStateChanged(auth, async (user) => {

  /* tsy connecté */
  if (!user) {
    window.location.replace("login.html");
    return;
  }

  /* admin ihany */
  if (
    user.email !== "rasolojean44@gmail.com" &&
    user.email !== "rjeantsioriniaina@gmail.com"
  ) {

    await signOut(auth);

    alert("Access denied");

    window.location.replace("login.html");

    return;
  }

  /* raha connecté */
  loadMessages();

});

/* 🚪 LOGOUT */
document.getElementById("logoutBtn").addEventListener("click", async () => {

  try{

    await signOut(auth);

    container.innerHTML = "";

    window.location.replace("login.html");

  }catch(error){

    console.error(error);

    alert("Logout failed");

  }

});

/* 📩 LOAD MESSAGES */
async function loadMessages(){

  try{

    const querySnapshot = await getDocs(collection(db, "messages"));

    container.innerHTML = "";

    if(querySnapshot.empty){

      container.innerHTML = `
        <p>No messages found.</p>
      `;

      loader.style.display = "none";

      return;
    }

    querySnapshot.forEach((docItem) => {

      const data = docItem.data();

      const card = document.createElement("div");

      card.className = "card";

      card.innerHTML = `
        <h3>👤 ${data.name || "No name"}</h3>

        <small>📧 ${data.email || "No email"}</small>

        <p class="message">
          ${data.message || "No message"}
        </p>

        <small>
          🕒 ${
            data.date?.toDate
              ? data.date.toDate().toLocaleString()
              : "No date"
          }
        </small>

        <br>

        <button class="btn" onclick="deleteMessage('${docItem.id}')">
          Delete
        </button>
      `;

      container.appendChild(card);

    });

    loader.style.display = "none";

  }catch(error){

    console.error(error);

    loader.innerHTML = "Error loading messages.";

  }

}

/* 🗑️ DELETE MESSAGE */
window.deleteMessage = async function(id){

  const confirmDelete = confirm("Delete this message ?");

  if(!confirmDelete) return;

  try{

    await deleteDoc(doc(db, "messages", id));

    loadMessages();

  }catch(error){

    console.error(error);

    alert("Delete failed");

  }

};

</script>

</body>
</html>
