<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  font-family: Inter, sans-serif;
  margin:0;
  background:#0b1220;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:#111827;
  padding:30px;
  border-radius:14px;
  width:100%;
  max-width:400px;
}

h1{
  text-align:center;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border:none;
  border-radius:10px;
  background:#0f172a;
  color:white;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:white;
  font-weight:600;
  cursor:pointer;
}

button:hover{
  background:#2563eb;
}

.error{
  color:#ef4444;
  text-align:center;
  margin-top:10px;
}
</style>

</head>

<body>

<div class="box">
  <h1>🔐 Admin Login</h1>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button id="loginBtn">Login</button>

  <div class="error" id="error"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyBFwxMznFt8basOqDELsilAupDG55-c4_M",
  authDomain: "notiva-store.firebaseapp.com",
  projectId: "notiva-store",
  storageBucket: "notiva-store.firebasestorage.app",
  messagingSenderId: "577146025738",
  appId: "1:577146025738:web:8dac6ce52b2cc07a266cf3"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const email = document.getElementById("email");
const password = document.getElementById("password");
const error = document.getElementById("error");
const loginBtn = document.getElementById("loginBtn");

/* LOGIN */
loginBtn.addEventListener("click", async () => {
  try {
    await signInWithEmailAndPassword(auth, email.value, password.value);

    // Redirect to dashboard
    window.location.href = "admin.html";

  } catch (err) {
    error.innerText = "❌ Login failed: " + err.message;
  }
});

/* AUTO REDIRECT IF ALREADY LOGGED IN */
onAuthStateChanged(auth, (user) => {
  if (user) {
    window.location.href = "admin.html";
  }
});
</script>

</body>
</html>
