<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  font-family: Inter, sans-serif;
  margin:0;
  background:#0b1220;
  color:white;
}

.container{
  max-width:800px;
  margin:auto;
  padding:40px 20px;
}

h1{
  font-size:38px;
  margin-bottom:10px;
}

p{
  color:#cbd5e1;
}

form{
  margin-top:30px;
  background:#111827;
  padding:25px;
  border-radius:12px;
}

input, textarea{
  width:100%;
  padding:12px;
  margin-top:10px;
  margin-bottom:15px;
  border-radius:10px;
  border:none;
  outline:none;
  background:#0f172a;
  color:white;
}

button{
  width:100%;
  padding:12px;
  background:#3b82f6;
  border:none;
  border-radius:10px;
  color:white;
  font-weight:600;
  cursor:pointer;
}

button:hover{
  background:#2563eb;
}

.loader-overlay{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.spinner{
  width:50px;
  height:50px;
  border:5px solid #1f2937;
  border-top:5px solid #3b82f6;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}

footer{
  text-align:center;
  margin-top:40px;
  color:gray;
}
</style>

</head>

<body>

<div class="container">

<h1>📩 Contact Us</h1>
<p>Send us a message and we will get back to you as soon as possible.</p>

<form id="contactForm">

  <input type="text" id="name" placeholder="Your Name" required>
  <input type="email" id="email" placeholder="Your Email" required>
  <textarea id="message" rows="5" placeholder="Your Message" required></textarea>

  <button type="submit">Send Message</button>

</form>

</div>

<div class="loader-overlay" id="loader">
  <div class="spinner"></div>
</div>

<footer>
<a href="index.html">← Home</a>
</footer>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 FIREBASE CONFIG (NOTIVA STORE) */
const firebaseConfig = {
  apiKey: "AIzaSyBFwxMznFt8basOqDELsilAupDG55-c4_M",
  authDomain: "notiva-store.firebaseapp.com",
  projectId: "notiva-store",
  storageBucket: "notiva-store.firebasestorage.app",
  messagingSenderId: "577146025738",
  appId: "1:577146025738:web:8dac6ce52b2cc07a266cf3",
  measurementId: "G-J6XZD55M9Y"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* FORM */
const form = document.getElementById("contactForm");
const loader = document.getElementById("loader");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  loader.style.display = "flex";

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const message = document.getElementById("message").value;

  try {
    await addDoc(collection(db, "messages"), {
      name,
      email,
      message,

      /* 🧠 SaaS CRM fields */
      reply: null,
      status: "new",
      priority: "normal",
      read: false,
      source: "website",

      createdAt: new Date(),
      updatedAt: null
    });

    alert("Message sent successfully!");

window.location.href = "index.html";
  } catch (error) {
    console.error(error);
    alert("Error sending message!");
  }

  loader.style.display = "none";
});

</script>

</body>
</html>
